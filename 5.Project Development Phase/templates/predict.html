{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Prediction Form</h3>
  <a class="btn btn-secondary" href="/">Back</a>
</div>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Applicant Name</label>
    <input name="applicant_name" class="form-control" />
  </div>
  <div class="row">
    <div class="col-md-4 mb-3"><label class="form-label">Age</label><input name="Age" class="form-control" type="number" required/></div>
    <div class="col-md-4 mb-3"><label class="form-label">Gender</label>
      <select name="Gender" class="form-select" required>
        <option value="">Choose...</option>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>
    <div class="col-md-4 mb-3"><label class="form-label">Education Level</label>
      <select name="Education_Level" class="form-select" required>
        <option value="">Choose...</option>
        <option>High School</option>
        <option>Bachelors</option>
        <option>Masters</option>
        <option>PhD</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3"><label class="form-label">Income Type</label>
      <select name="Income_Type" class="form-select" required>
        <option value="">Choose...</option>
        <option>Salaried</option>
        <option>Self-Employed</option>
        <option>Business</option>
        <option>Unemployed</option>
      </select>
    </div>
    <div class="col-md-4 mb-3"><label class="form-label">Employment Duration (years)</label><input name="Employment_Duration" class="form-control" type="number" min="0" step="1" required/></div>
    <div class="col-md-4 mb-3"><label class="form-label">Annual Income</label><input name="Annual_Income" class="form-control" type="number" step="0.01" required/></div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3"><label class="form-label">Marital Status</label>
      <select name="Marital_Status" class="form-select" required>
        <option value="">Choose...</option>
        <option>Single</option>
        <option>Married</option>
        <option>Divorced</option>
        <option>Widowed</option>
      </select>
    </div>
    <div class="col-md-4 mb-3"><label class="form-label">Occupation</label>
      <select name="Occupation" class="form-select" required>
        <option value="">Choose...</option>
        <option>Engineer</option>
        <option>Teacher</option>
        <option>Doctor</option>
        <option>Manager</option>
        <option>Clerk</option>
        <option>Self-Employed</option>
        <option>Other</option>
      </select>
    </div>
    <div class="col-md-4 mb-3"><label class="form-label">Housing Type</label>
      <select name="Housing_Type" class="form-select" required>
        <option value="">Choose...</option>
        <option>Owned</option>
        <option>Rented</option>
        <option>Mortgage</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3"><label class="form-label">Credit Score</label><input name="Credit_Score" class="form-control" type="number" required/></div>
    <div class="col-md-4 mb-3"><label class="form-label">Existing Loans</label><input name="Existing_Loans" class="form-control" type="number" required/></div>
    <div class="col-md-4 mb-3"><label class="form-label">Loan Amount</label><input name="Loan_Amount" class="form-control" type="number" step="0.01" required/></div>
  </div>
  <div class="row">
    <div class="col-md-4 mb-3"><label class="form-label">Number of Dependents</label><input name="Family_Members" class="form-control" type="number" required/></div>
    <div class="col-md-4 mb-3"><label class="form-label">Payment History</label>
      <select name="Payment_History" class="form-select" required>
        <option value="">Choose...</option>
        <option>Good</option>
        <option>Average</option>
        <option>Bad</option>
      </select>
    </div>
  </div>
  <button class="btn btn-primary">Submit</button>
</form>
{% endblock %}
